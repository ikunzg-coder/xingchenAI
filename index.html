<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #f0f2f5;
      --border: #e8eaed;
      --border-light: #f0f2f5;
      --text-primary: #1a1a1a;
      --text-secondary: #5f6368;
      --text-muted: #9aa0a6;
      --accent: #4285f4;
      --accent-light: #e8f0fe;
      --user-bg: #4285f4;
      --user-text: #ffffff;
      --ai-bg: #f8f9fa;
      --ai-border: #e8eaed;
      --thinking-bg: #fafafa;
      --thinking-border: #e8eaed;
      --thinking-text: #5f6368;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 4px 20px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .logo svg {
      width: 20px;
      height: 20px;
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-color: var(--border);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .chat-area::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 20px;
      animation: fadeIn 0.5s ease;
    }

    .welcome-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
    }

    .welcome-logo svg {
      width: 36px;
      height: 36px;
    }

    .welcome h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 380px;
      line-height: 1.6;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      width: 100%;
      max-width: 440px;
    }

    .suggestion-chip {
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
      line-height: 1.4;
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      background: var(--accent-light);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 14px;
      margin-bottom: 24px;
      animation: fadeIn 0.3s ease;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      overflow: hidden;
    }

    .message.user .message-avatar {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .message-avatar svg {
      width: 18px;
      height: 18px;
    }

    .message-content {
      max-width: 78%;
      min-width: 60px;
    }

    .message.user .message-content {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .message-bubble {
      padding: 14px 18px;
      border-radius: var(--radius-lg);
      line-height: 1.65;
      font-size: 0.9375rem;
      word-break: break-word;
    }

    .message.user .message-bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles */
    .message.assistant .message-bubble p { margin-bottom: 10px; }
    .message.assistant .message-bubble p:last-child { margin-bottom: 0; }
    .message.assistant .message-bubble code {
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.875em;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    }
    .message.assistant .message-bubble pre {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .message.assistant .message-bubble pre code {
      background: none;
      padding: 0;
      font-size: 0.8125rem;
      color: #d4d4d4;
    }
    .message.assistant .message-bubble ul,
    .message.assistant .message-bubble ol {
      padding-left: 20px;
      margin: 8px 0;
    }
    .message.assistant .message-bubble li { margin-bottom: 4px; }
    .message.assistant .message-bubble strong { color: var(--text-primary); font-weight: 600; }
    .message.assistant .message-bubble h1,
    .message.assistant .message-bubble h2,
    .message.assistant .message-bubble h3 {
      margin: 14px 0 8px;
      font-weight: 600;
    }
    .message.assistant .message-bubble h1 { font-size: 1.15em; }
    .message.assistant .message-bubble h2 { font-size: 1.05em; }
    .message.assistant .message-bubble h3 { font-size: 1em; }
    .message.assistant .message-bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      margin: 10px 0;
      color: var(--text-secondary);
    }

    .message-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 0 4px;
    }

    .message-error .message-bubble {
      background: #fef2f2;
      border-color: #fecaca;
      color: #dc2626;
    }

    /* Thinking block - streaming */
    .thinking-block {
      margin-bottom: 12px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--thinking-border);
      background: var(--thinking-bg);
    }

    .thinking-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .thinking-icon {
      font-size: 0.9rem;
    }

    .thinking-status {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .thinking-status.thinking::after {
      content: '...';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .thinking-content {
      padding: 12px 14px;
      font-size: 0.8125rem;
      color: var(--thinking-text);
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
    }

    .thinking-content::-webkit-scrollbar { width: 4px; }
    .thinking-content::-webkit-scrollbar-track { background: transparent; }
    .thinking-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .thinking-content p { margin-bottom: 6px; }
    .thinking-content p:last-child { margin-bottom: 0; }

    .thinking-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
    }

    .thinking-loading-dots {
      display: flex;
      gap: 3px;
    }

    .thinking-loading-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: thinkingPulse 1.2s infinite ease-in-out;
    }

    .thinking-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes thinkingPulse {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0.32s; }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 16px 0 24px;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 12px 12px 18px;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
    }

    .input-wrapper textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9375rem;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      padding: 4px 0;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    .send-btn:hover:not(:disabled) {
      background: #3367d6;
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    .input-hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header-title { font-size: 1.1rem; }
      .message-content { max-width: 82%; }
      .suggestions { grid-template-columns: 1fr; }
      .welcome h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.09 8.26L20.18 8.63L15.54 12.74L17.63 18.99L12 15.77L6.37 18.99L8.46 12.74L3.82 8.63L9.91 8.26L12 2Z" fill="white" opacity="0.9"/>
            <circle cx="18" cy="5" r="1.5" fill="white" opacity="0.6"/>
            <circle cx="6" cy="19" r="1" fill="white" opacity="0.4"/>
          </svg>
        </div>
        <div class="header-title">星尘</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="清空对话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <div class="welcome-logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.09 8.26L20.18 8.63L15.54 12.74L17.63 18.99L12 15.77L6.37 18.99L8.46 12.74L3.82 8.63L9.91 8.26L12 2Z" fill="white" opacity="0.9"/>
            <circle cx="18" cy="5" r="1.5" fill="white" opacity="0.6"/>
            <circle cx="6" cy="19" r="1" fill="white" opacity="0.4"/>
          </svg>
        </div>
        <h2>你好，我是星尘</h2>
        <p>一个可以回答任何问题的 AI 助手，随时为你效劳。</p>
        <div class="suggestions">
          <button class="suggestion-chip" data-q="用简单的语言解释一下量子计算">💡 解释量子计算</button>
          <button class="suggestion-chip" data-q="帮我写一个 Python 快速排序">🧑‍💻 Python 快速排序</button>
          <button class="suggestion-chip" data-q="给我讲一个有趣的冷知识">🎲 有趣的冷知识</button>
          <button class="suggestion-chip" data-q="如何提高工作效率？">🚀 提高工作效率</button>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="输入你的问题..." autofocus></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">按 Enter 发送，Shift + Enter 换行</div>
    </div>
  </div>

  <script>
    // State
    const state = {
      messages: JSON.parse(localStorage.getItem('stardust_messages') || '[]'),
      isLoading: false,
    };

    // DOM
    const chatArea = document.getElementById('chatArea');
    const welcome = document.getElementById('welcome');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');

    // Configure marked
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
    });

    // Helpers
    function saveMessages() {
      localStorage.setItem('stardust_messages', JSON.stringify(state.messages));
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function autoResize() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      sendBtn.disabled = !userInput.value.trim() || state.isLoading;
    }

    function createMessageEl(role, content, timestamp, thinking, isStreaming) {
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      if (role === 'user') {
        avatar.textContent = '你';
      } else {
        avatar.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.09 8.26L20.18 8.63L15.54 12.74L17.63 18.99L12 15.77L6.37 18.99L8.46 12.74L3.82 8.63L9.91 8.26L12 2Z" fill="white" opacity="0.9"/><circle cx="18" cy="5" r="1.5" fill="white" opacity="0.6"/><circle cx="6" cy="19" r="1" fill="white" opacity="0.4"/></svg>';
      }

      const contentWrap = document.createElement('div');
      contentWrap.className = 'message-content';

      // Show thinking content if exists
      if (role === 'assistant' && thinking) {
        const thinkingBlock = document.createElement('div');
        thinkingBlock.className = 'thinking-block';
        thinkingBlock.innerHTML = `
          <div class="thinking-header">
            <span class="thinking-icon">💭</span>
            <span>思考过程</span>
            <span class="thinking-status ${isStreaming ? 'thinking' : ''}">${isStreaming ? '思考中' : '已完成'}</span>
          </div>
          <div class="thinking-content">${marked.parse(thinking)}</div>
        `;
        contentWrap.appendChild(thinkingBlock);
      }

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';

      if (role === 'assistant') {
        bubble.innerHTML = marked.parse(content);
      } else {
        bubble.textContent = content;
      }

      contentWrap.appendChild(bubble);

      if (timestamp && !isStreaming) {
        const time = document.createElement('div');
        time.className = 'message-time';
        time.textContent = formatTime(timestamp);
        contentWrap.appendChild(time);
      }

      msg.appendChild(avatar);
      msg.appendChild(contentWrap);
      return msg;
    }

    function renderMessages() {
      chatArea.querySelectorAll('.message').forEach(el => el.remove());
      if (state.messages.length > 0) {
        welcome.style.display = 'none';
        state.messages.forEach(m => {
          chatArea.appendChild(createMessageEl(m.role, m.content, m.timestamp, m.thinking));
        });
        scrollToBottom();
      } else {
        welcome.style.display = '';
      }
    }

    function showError(text) {
      const msg = document.createElement('div');
      msg.className = 'message assistant message-error';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '!';

      const contentWrap = document.createElement('div');
      contentWrap.className = 'message-content';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;

      contentWrap.appendChild(bubble);
      msg.appendChild(avatar);
      msg.appendChild(contentWrap);
      chatArea.appendChild(msg);
      scrollToBottom();
    }

    // Send message with streaming
    async function sendMessage(text) {
      if (state.isLoading) return;
      if (!text.trim()) return;

      welcome.style.display = 'none';

      const userMsg = { role: 'user', content: text, timestamp: Date.now() };
      state.messages.push(userMsg);
      saveMessages();
      chatArea.appendChild(createMessageEl('user', text, userMsg.timestamp));
      scrollToBottom();

      userInput.value = '';
      autoResize();

      state.isLoading = true;
      sendBtn.disabled = true;

      // Create streaming message container
      const streamingMsg = document.createElement('div');
      streamingMsg.className = 'message assistant';
      streamingMsg.id = 'streamingMsg';
      streamingMsg.innerHTML = `
        <div class="message-avatar"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.09 8.26L20.18 8.63L15.54 12.74L17.63 18.99L12 15.77L6.37 18.99L8.46 12.74L3.82 8.63L9.91 8.26L12 2Z" fill="white" opacity="0.9"/><circle cx="18" cy="5" r="1.5" fill="white" opacity="0.6"/><circle cx="6" cy="19" r="1" fill="white" opacity="0.4"/></svg></div>
        <div class="message-content">
          <div class="thinking-block">
            <div class="thinking-header">
              <span class="thinking-icon">💭</span>
              <span>思考过程</span>
              <span class="thinking-status thinking">思考中</span>
            </div>
            <div class="thinking-content" id="streamingThinking">
              <div class="thinking-loading">
                <div class="thinking-loading-dots">
                  <span></span><span></span><span></span>
                </div>
                <span>正在思考...</span>
              </div>
            </div>
          </div>
          <div class="message-bubble" id="streamingBubble">
            <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
          </div>
        </div>
      `;
      chatArea.appendChild(streamingMsg);
      scrollToBottom();

      const streamingThinking = document.getElementById('streamingThinking');
      const streamingBubble = document.getElementById('streamingBubble');

      let fullContent = '';
      let fullThinking = '';
      let hasThinkingContent = false;

      try {
        const response = await fetch('https://text.pollinations.ai/openai', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'openai',
            messages: state.messages.map(m => ({ role: m.role, content: m.content })),
            stream: true,
          }),
        });

        if (!response.ok) {
          throw new Error(`请求失败 (${response.status})`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;

              try {
                const parsed = JSON.parse(data);
                const delta = parsed.choices?.[0]?.delta;

                if (delta?.reasoning) {
                  if (!hasThinkingContent) {
                    streamingThinking.innerHTML = '';
                    hasThinkingContent = true;
                  }
                  fullThinking += delta.reasoning;
                  streamingThinking.innerHTML = marked.parse(fullThinking);
                  streamingThinking.scrollTop = streamingThinking.scrollHeight;
                }

                if (delta?.content) {
                  fullContent += delta.content;
                  streamingBubble.innerHTML = marked.parse(fullContent);
                  scrollToBottom();
                }
              } catch (e) {
                // Skip invalid JSON
              }
            }
          }
        }

        // Remove streaming message and add final message
        streamingMsg.remove();

        const aiMsg = {
          role: 'assistant',
          content: fullContent || '未收到回复',
          thinking: fullThinking,
          timestamp: Date.now()
        };
        state.messages.push(aiMsg);
        saveMessages();

        chatArea.appendChild(createMessageEl('assistant', aiMsg.content, aiMsg.timestamp, aiMsg.thinking));
        scrollToBottom();

      } catch (err) {
        streamingMsg.remove();
        showError(err.message || '请求失败，请稍后重试');
      } finally {
        state.isLoading = false;
        autoResize();
      }
    }

    // Events
    userInput.addEventListener('input', autoResize);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(userInput.value.trim());
      }
    });

    sendBtn.addEventListener('click', () => {
      sendMessage(userInput.value.trim());
    });

    clearBtn.addEventListener('click', () => {
      if (state.messages.length === 0) return;
      if (confirm('确定要清空所有对话记录吗？')) {
        state.messages = [];
        saveMessages();
        chatArea.querySelectorAll('.message').forEach(el => el.remove());
        welcome.style.display = '';
      }
    });

    // Suggestions
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const q = chip.getAttribute('data-q');
        userInput.value = q;
        autoResize();
        sendMessage(q);
      });
    });

    // Init
    renderMessages();
    autoResize();
  </script>
</body>
</html>
